services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-auto_amazon}
      MYSQL_USER: ${MYSQL_USER:-auto_amazon}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-auto_amazon}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme_root}
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 40s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  web:
    build: .
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: auto_amazon_project.settings
      DB_HOST: db
      DB_NAME: ${MYSQL_DATABASE:-auto_amazon}
      DB_USER: ${MYSQL_USER:-auto_amazon}
      DB_PASSWORD: ${MYSQL_PASSWORD:-auto_amazon}
      DB_PORT: "3306"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "1"
      REDIS_PASSWORD: ""
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/static:ro
      - media_data:/media:ro
    depends_on:
      - web

volumes:
  mysql_data:
  redis_data:
  static_data:
  media_data:
