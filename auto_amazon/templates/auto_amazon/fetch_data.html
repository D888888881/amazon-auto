{% extends 'base.html' %}
{% block title %}获取数据 — Amazon 自动化{% endblock %}
{% block main_class %}main--upload{% endblock %}
{% block content %}
<div class="upload-page">
    <header class="upload-hero">
        <h1 class="upload-hero__title">获取数据</h1>
        <p class="upload-hero__desc">仅超级管理员可见。该页面用于后续接入抓取/同步数据任务。</p>
    </header>
    <section class="upload-panel upload-panel--pair">
        <div class="upload-panel__head">
            <span class="upload-panel__badge">B</span>
            <div>
                <h2 class="upload-panel__title">功能预留</h2>
                <p class="upload-panel__hint">你后续可以把“采集数据/API同步”的按钮和参数放到这里。</p>
            </div>
        </div>
    </section>
</div>
{% endblock %}
